<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var k = 'site-theme';
          var s = localStorage.getItem(k);
          var dark = s === 'dark' || (s !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (_) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/logo.png" type="image/png" sizes="180x180" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta
      name="description"
      content="Rønningen selskapslokale ved Sylling i Lier — bryllup, bedriftsevent, konfirmasjon, bursdag og fest. Moderne lokaler og personlig oppfølging."
    />
    <title>Rønningen Selskapslokale</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
